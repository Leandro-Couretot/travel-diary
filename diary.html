<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅 — Diario</title>
<link rel="stylesheet" href="style.css">
<script src="https://accounts.google.com/gsi/client" onload="onGsiLoaded()" async></script>
<script src="drive.js"></script>
<style>

/* ─── DIARY PAGE ─── */
main {
  max-width: 760px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 6rem;
}

/* ─── BACK LINK ─── */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.78rem;
  color: var(--ink-muted);
  text-decoration: none;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 2rem;
  transition: color 0.15s;
}
.back-link:hover { color: var(--accent); }

/* ─── DAY HEADER ─── */
.day-header {
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--ink-faint);
}
.day-label {
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.4rem;
}
#day-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  line-height: 1.2;
  letter-spacing: -0.02em;
  background: none;
  border: none;
  outline: none;
  color: var(--ink);
  width: 100%;
  resize: none;
  overflow: hidden;
}
#day-title::placeholder { color: var(--ink-faint); }

/* ─── DIARY TEXT ─── */
.section-label {
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.5rem;
}
#day-notes {
  width: 100%;
  min-height: 100px;
  background: none;
  border: none;
  border-bottom: 1px solid var(--ink-faint);
  outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 300;
  color: var(--ink);
  line-height: 1.8;
  resize: none;
  padding-bottom: 0.5rem;
  transition: border-color 0.2s;
}
#day-notes:focus { border-color: var(--accent); }
#day-notes::placeholder { color: var(--ink-faint); }

/* ─── UPLOAD ─── */
.upload-section { margin: 2rem 0; }
.drop-zone {
  border: 1.5px dashed var(--ink-faint);
  border-radius: var(--radius-lg);
  padding: 2rem 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-light);
}
.drop-icon { font-size: 1.8rem; margin-bottom: 0.5rem; opacity: 0.5; }
.drop-text { font-size: 0.875rem; color: var(--ink-muted); }
.drop-text strong { color: var(--ink); font-weight: 500; }
.drop-sub { font-size: 0.75rem; color: var(--ink-faint); margin-top: 0.3rem; }
#file-input { display: none; }

/* ─── RECORDER ─── */
.recorder-row {
  display: flex; align-items: center; gap: 0.75rem;
  margin-top: 0.75rem; padding: 0.75rem 1rem;
  background: var(--surface);
  border: 1.5px solid var(--ink-faint);
  border-radius: var(--radius-lg);
  transition: border-color 0.2s;
}
.recorder-row.recording { border-color: var(--red); background: #fdf5f5; }
.btn-record {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0; transition: all 0.2s;
  background: var(--ink); color: white;
}
.btn-record:hover { background: var(--accent); }
.btn-record.recording { background: var(--red); animation: pulse-rec 1.2s ease-in-out infinite; }
@keyframes pulse-rec {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
  50%       { box-shadow: 0 0 0 8px rgba(192,57,43,0); }
}
.recorder-info { flex: 1; display: flex; flex-direction: column; gap: 0.15rem; }
.recorder-label { font-size: 0.8rem; font-weight: 500; color: var(--ink); }
.recorder-sub { font-size: 0.72rem; color: var(--ink-muted); }
.recorder-timer {
  font-family: 'DM Serif Display', serif; font-size: 1.1rem;
  color: var(--red); min-width: 48px; text-align: right; letter-spacing: 0.04em;
}

/* ─── MEDIA GRID ─── */
.media-section { margin-top: 2rem; }
.media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
}
.media-card {
  background: var(--surface); border-radius: 6px; overflow: hidden;
  box-shadow: var(--shadow-sm); transition: transform 0.2s;
  animation: fadeUp 0.3s ease both;
}
.media-card:hover { transform: translateY(-2px); }
.media-thumb { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
.audio-thumb {
  width: 100%; background: var(--accent-light);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 1.25rem 1rem; gap: 0.5rem;
}
.audio-icon { font-size: 1.75rem; opacity: 0.6; }
.audio-filename { font-size: 0.7rem; color: var(--ink-muted); text-align: center; word-break: break-all; }
audio { width: 100%; height: 32px; }
.media-footer { padding: 0.6rem 0.75rem 0.75rem; }
.media-caption {
  width: 100%; border: none; outline: none; background: none;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 300;
  color: var(--ink); line-height: 1.5; resize: none; min-height: 36px;
  border-bottom: 1px solid transparent; transition: border-color 0.2s; overflow: hidden;
}
.media-caption:focus { border-color: var(--ink-faint); }
.media-caption::placeholder { color: var(--ink-faint); }
.media-footer-actions { display: flex; gap: 1rem; margin-top: 0.3rem; }
.media-delete {
  background: none; border: none; color: var(--ink-faint);
  cursor: pointer; font-size: 0.75rem; padding: 0.2rem 0;
  transition: color 0.15s;
}
.media-delete:hover { color: var(--red); }
.media-set-cover {
  background: none; border: none; color: var(--ink-faint);
  cursor: pointer; font-size: 0.75rem; padding: 0.2rem 0;
  transition: color 0.15s;
}
.media-set-cover:hover { color: var(--accent); }
.media-set-cover.is-cover { color: var(--accent); font-weight: 500; }
.empty-media { text-align: center; padding: 1rem 0 0; color: var(--ink-faint); font-size: 0.85rem; }

/* ─── VIDEO ─── */
.video-thumb {
  width: 100%; aspect-ratio: 4/3; display: block;
  background: #0e0e0c;
}

/* ─── DRAG TO REORDER ─── */
.media-card {
  cursor: grab;
}
.media-card:active { cursor: grabbing; }
.media-card.dragging {
  opacity: 0.4;
  transform: scale(0.97);
  box-shadow: none;
}
.media-card.drag-over {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.drag-handle {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.35rem 0;
  color: var(--ink-faint);
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  cursor: grab;
  user-select: none;
}
.drag-handle:active { cursor: grabbing; }

/* ─── ALBUM VIEW ─── */
.album-overlay {
  display: none;
  position: fixed; inset: 0;
  background: #0e0e0c;
  z-index: 300;
  flex-direction: column;
}
.album-overlay.open { display: flex; }
.album-topbar {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.75rem 1rem;
  background: rgba(14,14,12,0.9);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
}
.album-topbar-info {
  flex: 1; display: flex; flex-direction: column; gap: 0.1rem; overflow: hidden;
}
.album-topbar-date { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
.album-topbar-count { font-size: 0.78rem; color: rgba(255,255,255,0.5); }
.album-body { flex: 1; overflow: hidden; position: relative; }
.album-page { height: 100%; display: flex; flex-direction: column; }
.album-hero {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #0e0e0c;
}
.album-hero img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
.album-hero-empty {
  font-family: 'DM Serif Display', serif; font-size: 5rem;
  color: rgba(255,255,255,0.08);
}
.album-photo-nav {
  position: absolute; inset: 0; display: flex;
}
.album-photo-prev, .album-photo-next {
  flex: 1; cursor: pointer;
}
.album-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 1.5rem 1.25rem 1rem;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  font-size: 0.85rem; color: rgba(255,255,255,0.85); line-height: 1.5;
}
.album-dots {
  position: absolute; bottom: 0.75rem; left: 50%; transform: translateX(-50%);
  display: flex; gap: 5px;
}
.album-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.3); transition: background 0.2s;
}
.album-dot.active { background: white; }
.album-content {
  flex-shrink: 0;
  padding: 1rem 1.25rem 0.5rem;
  background: #0e0e0c;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.album-day-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 0.25rem; }
.album-title { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: white; line-height: 1.2; }
.album-title.no-title { color: rgba(255,255,255,0.25); font-style: italic; }
.album-notes { font-size: 0.82rem; color: rgba(255,255,255,0.55); margin-top: 0.4rem; line-height: 1.6; max-height: 3.5em; overflow: hidden; }
.album-strip {
  display: flex; gap: 4px; padding: 0.5rem 1.25rem 1rem;
  overflow-x: auto; flex-shrink: 0; background: #0e0e0c;
}
.album-strip::-webkit-scrollbar { display: none; }
.album-strip-thumb {
  width: 52px; height: 52px; object-fit: cover; border-radius: 3px;
  cursor: pointer; opacity: 0.5; transition: opacity 0.15s; flex-shrink: 0;
}
.album-strip-thumb.active { opacity: 1; }

/* ─── DAYS FEED MODAL ─── */
.day-list-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1.5rem; cursor: pointer; transition: background 0.15s; gap: 0.75rem;
}
.day-list-item:hover { background: var(--accent-light); }
.day-list-item.active { background: var(--accent-light); }
.day-list-thumb {
  width: 40px; height: 40px; border-radius: 3px; object-fit: cover;
  background: var(--accent-light); flex-shrink: 0;
}
.day-list-info { flex: 1; min-width: 0; }
.day-list-date { font-family: 'DM Serif Display', serif; font-size: 0.9rem; }
.day-list-title { font-size: 0.75rem; color: var(--ink-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-list-count { font-size: 0.72rem; color: var(--ink-faint); white-space: nowrap; }
.empty-days { padding: 2rem 1.5rem; text-align: center; color: var(--ink-muted); font-size: 0.875rem; }

/* ─── FEED MODAL ─── */
#modal-feed .modal { max-width: 360px; }

/* ─── LOADING ─── */
.page-loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 60vh; gap: 0.75rem; color: var(--ink-muted); font-size: 0.875rem;
}
.spinner {
  width: 18px; height: 18px; border: 2px solid var(--ink-faint);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 500px) {
  main { padding: 1.5rem 1rem 5rem; }
  .media-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  #day-title { font-size: 1.5rem; }
}
</style>
</head>
<body>

<header class="app-header">
  <a href="index.html" class="app-logo">旅 <span id="album-name-header">diario</span></a>
  <div style="display:flex;gap:0.5rem;align-items:center;">
    <button class="btn-nav" id="btn-prev" title="Día anterior">←</button>
    <div class="date-display btn-nav" id="date-display" title="Elegir fecha" style="cursor:pointer;">—</div>
    <button class="btn-nav" id="btn-next" title="Día siguiente">→</button>
    <input type="date" id="date-input" style="position:absolute;opacity:0;pointer-events:none;top:64px;right:1rem;">
    <button class="btn-nav" id="btn-album" title="Ver álbum">▣</button>
    <button class="btn-nav" id="btn-feed" title="Ver todos los días">☰</button>
  </div>
</header>

<main id="main-content">
  <div class="page-loading">
    <div class="spinner"></div>
    Cargando...
  </div>
</main>

<!-- Album overlay -->
<div class="album-overlay" id="album-overlay">
  <div class="album-topbar">
    <button class="btn-nav" id="album-btn-prev" onclick="albumNav(-1)" style="color:white;border-color:rgba(255,255,255,0.2);">←</button>
    <div class="album-topbar-info">
      <div class="album-topbar-date" id="album-date"></div>
      <div class="album-topbar-count" id="album-count"></div>
    </div>
    <button class="btn-nav" id="album-btn-edit" title="Editar" style="color:white;border-color:rgba(255,255,255,0.2);">✏</button>
    <button class="btn-nav" onclick="closeAlbum()" style="color:white;border-color:rgba(255,255,255,0.2);">✕</button>
    <button class="btn-nav" id="album-btn-next" onclick="albumNav(1)" style="color:white;border-color:rgba(255,255,255,0.2);">→</button>
  </div>
  <div class="album-body"
       ontouchstart="albumSwipeStart(event)"
       ontouchend="albumSwipeEnd(event)">
    <div class="album-page" id="album-page">
      <div class="album-hero" id="album-hero"></div>
      <div class="album-content">
        <div class="album-day-label" id="album-label"></div>
        <div class="album-title" id="album-title"></div>
        <div class="album-notes" id="album-notes"></div>
      </div>
      <div class="album-strip" id="album-strip"></div>
    </div>
  </div>
</div>

<!-- Feed modal -->
<div class="modal-overlay" id="modal-feed">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="feed-title">Días del viaje</div>
      <button class="modal-close" id="feed-close">×</button>
    </div>
    <div class="day-list" id="day-list"></div>
  </div>
</div>

<!-- Save bar -->
<div class="save-bar">
  <div class="save-status" id="save-status">Sin cambios</div>
  <div class="save-actions">
    <button class="btn btn-secondary" id="btn-discard">Descartar</button>
    <button class="btn btn-primary" id="btn-save">Guardar día</button>
  </div>
</div>

<script>
// ─── URL PARAMS ──────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const albumId  = params.get('album');

if (!albumId) location.href = 'index.html';

// ─── STATE ───────────────────────────────────────────────
let currentDate    = todayStr();
let currentDay     = emptyDay();
let albumFolderId  = null;
let albumMeta      = null;
let dirty          = false;
let gsiLoaded      = false;

// ─── GSI LOADED ──────────────────────────────────────────
async function onGsiLoaded() {
  gsiLoaded = true;
  initDrive(async () => {
    albumFolderId = await getAlbumFolderId(albumId);
    const albums  = await loadAlbums();
    albumMeta     = albums.find(a => a.id === albumId) || { name: albumId };
    document.getElementById('album-name-header').textContent = albumMeta.name;
    document.title = `旅 — ${albumMeta.name}`;
    renderPage();
    await loadDay(currentDate);
  });

  // tokenClient for manual connect
  try {
    window._tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: DRIVE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: async (res) => {
        if (res.error) return;
        driveToken = res.access_token;
        localStorage.setItem('drive_token', driveToken);
        rootFolderId    = await getOrCreateFolder(ROOT_FOLDER, 'root');
        albumFolderId   = await getAlbumFolderId(albumId);
        const albums    = await loadAlbums();
        albumMeta       = albums.find(a => a.id === albumId) || { name: albumId };
        document.getElementById('album-name-header').textContent = albumMeta.name;
        renderPage();
        await loadDay(currentDate);
      }
    });
  } catch(e) {}

  if (!isDriveConnected()) {
    // No Drive token — send back to index to login
    location.href = `index.html?redirect=${encodeURIComponent(location.href)}`;
  }
}

// ─── RENDER PAGE ─────────────────────────────────────────
function renderPage() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <a href="index.html" class="back-link">← Mis viajes</a>
    <div class="day-header">
      <div class="day-label" id="day-label">Hoy</div>
      <div class="day-title-row">
        <textarea id="day-title" rows="1" placeholder="¿Cómo llamarías a este día?"></textarea>
      </div>
    </div>
    <div style="margin-bottom:2rem;">
      <div class="section-label">Notas del día</div>
      <textarea id="day-notes" placeholder="¿Qué pasó hoy? ¿Qué sentiste? ¿Qué querés recordar..."></textarea>
    </div>
    <div class="upload-section">
      <div class="drop-zone" id="drop-zone">
        <div class="drop-icon">📎</div>
        <div class="drop-text"><strong>Subí fotos o audios</strong></div>
        <div class="drop-sub">jpg, png, heic · mp4, mov · mp3, m4a · arrastrá o tocá acá</div>
      </div>
      <input type="file" id="file-input" accept="image/*,audio/*,video/*" multiple>
      <div class="recorder-row" id="recorder-row">
        <button class="btn-record" id="btn-record" title="Grabar audio">🎙️</button>
        <div class="recorder-info">
          <div class="recorder-label" id="recorder-label">Grabar audio</div>
          <div class="recorder-sub" id="recorder-sub">Tocá para empezar a grabar</div>
        </div>
        <div class="recorder-timer" id="recorder-timer" style="display:none;">0:00</div>
      </div>
    </div>
    <div class="media-section">
      <div class="media-grid" id="media-grid"></div>
      <div class="empty-media" id="empty-media" style="display:none;">Todavía no hay fotos ni audios para este día</div>
    </div>`;

  bindPageEvents();
  initRecorder();

  // Restore field values if day already loaded
  if (currentDay) {
    document.getElementById('day-title').value = currentDay.title || '';
    document.getElementById('day-notes').value = currentDay.notes || '';
    autoResize(document.getElementById('day-title'));
    autoResize(document.getElementById('day-notes'));
    renderMedia();
  }
}

// ─── LOAD / SAVE ─────────────────────────────────────────
async function loadDay(dateStr) {
  currentDate = dateStr;
  dirty = false;
  updateDateHeader();
  setStatus('', 'Cargando...');

  try {
    const driveDay = await loadDayFromDrive(albumFolderId, dateStr);
    currentDay = driveDay || emptyDay();
  } catch(e) {
    setStatus('error', 'Error al cargar desde Drive');
    currentDay = emptyDay();
  }

  const titleEl = document.getElementById('day-title');
  const notesEl = document.getElementById('day-notes');
  if (titleEl) {
    titleEl.value = currentDay.title || '';
    notesEl.value = currentDay.notes || '';
    autoResize(titleEl); autoResize(notesEl);
  }
  renderMedia();
  setStatus('', 'Sin cambios');
}

async function saveCurrentDay() {
  setStatus('', 'Guardando...');
  try {
    currentDay = await saveDayToDrive(albumFolderId, currentDate, currentDay);

    // Auto-set album cover if none set yet
    if (albumMeta && !albumMeta.coverFileId) {
      const firstImg = currentDay.media.find(m => m.type === 'image' && m.driveFileId);
      if (firstImg) albumMeta = await updateAlbumMeta(albumId, { coverFileId: firstImg.driveFileId });
    }

    dirty = false;
    setStatus('saved', 'Guardado en Drive ✓');
    setTimeout(() => { if (!dirty) setStatus('', 'Sin cambios'); }, 2500);
  } catch(e) {
    setStatus('error', 'Error al guardar: ' + e.message);
  }
}

// ─── RENDER MEDIA ────────────────────────────────────────
function renderMedia() {
  const grid  = document.getElementById('media-grid');
  const empty = document.getElementById('empty-media');
  if (!grid) return;
  grid.innerHTML = '';
  if (!currentDay.media.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  currentDay.media.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'media-card';
    card.style.animationDelay = `${idx * 0.04}s`;
    card.dataset.idx = idx;
    card.draggable = true;
    const isCover = albumMeta && albumMeta.coverFileId && item.driveFileId === albumMeta.coverFileId;

    if (item.type === 'image') {
      const imgSrc = item.data || (item.driveFileId ? `https://drive.google.com/thumbnail?id=${item.driveFileId}&sz=w1200` : '');
      card.innerHTML = `
        <div class="drag-handle">⠿⠿⠿</div>
        <img class="media-thumb" src="${imgSrc}" alt="${item.name}" loading="lazy">
        <div class="media-footer">
          <textarea class="media-caption" placeholder="Comentario sobre esta foto..." data-idx="${idx}" rows="2">${item.caption || ''}</textarea>
          <div class="media-footer-actions">
            <button class="media-delete" data-idx="${idx}">Eliminar</button>
            <button class="media-set-cover ${isCover ? 'is-cover' : ''}" data-idx="${idx}">${isCover ? '★ Portada' : '☆ Portada'}</button>
          </div>
        </div>`;

    } else if (item.type === 'video') {
      const videoSrc = item.data || '';
      card.innerHTML = `
        <div class="drag-handle">⠿⠿⠿</div>
        ${videoSrc
          ? `<video class="video-thumb" controls playsinline preload="metadata" src="${videoSrc}"></video>`
          : `<div class="audio-thumb"><div class="audio-icon">🎬</div><div class="audio-filename">${item.name}</div><div class="audio-loading" data-idx="${idx}" style="font-size:0.75rem;color:var(--ink-muted);">Cargando video...</div></div>`}
        <div class="media-footer">
          <textarea class="media-caption" placeholder="Comentario sobre este video..." data-idx="${idx}" rows="2">${item.caption || ''}</textarea>
          <div class="media-footer-actions">
            <button class="media-delete" data-idx="${idx}">Eliminar</button>
          </div>
        </div>`;
      if (!videoSrc && item.driveFileId) {
        fetchFileAsDataUrl(item.driveFileId).then(dataUrl => {
          item.data = dataUrl;
          const el = card.querySelector(`.audio-loading[data-idx="${idx}"]`);
          if (el) {
            const v = document.createElement('video');
            v.className = 'video-thumb'; v.controls = true; v.playsinline = true;
            v.preload = 'metadata'; v.src = dataUrl;
            el.closest('.audio-thumb').replaceWith(v);
          }
        }).catch(() => {
          const el = card.querySelector(`.audio-loading[data-idx="${idx}"]`);
          if (el) el.textContent = 'Video no disponible';
        });
      }

    } else {
      // audio
      const audioSrc = item.data || '';
      card.innerHTML = `
        <div class="drag-handle">⠿⠿⠿</div>
        <div class="audio-thumb">
          <div class="audio-icon">🎙️</div>
          <div class="audio-filename">${item.name}</div>
          ${audioSrc
            ? `<audio controls src="${audioSrc}"></audio>`
            : `<div class="audio-loading" data-idx="${idx}" style="font-size:0.75rem;color:var(--ink-muted);padding:0.5rem 0;">Cargando audio...</div>`}
        </div>
        <div class="media-footer">
          <textarea class="media-caption" placeholder="Comentario sobre este audio..." data-idx="${idx}" rows="2">${item.caption || ''}</textarea>
          <div class="media-footer-actions">
            <button class="media-delete" data-idx="${idx}">Eliminar</button>
          </div>
        </div>`;
      if (!audioSrc && item.driveFileId) {
        fetchFileAsDataUrl(item.driveFileId).then(dataUrl => {
          item.data = dataUrl;
          const el = card.querySelector(`.audio-loading[data-idx="${idx}"]`);
          if (el) { const a = document.createElement('audio'); a.controls = true; a.src = dataUrl; el.replaceWith(a); }
        }).catch(() => {
          const el = card.querySelector(`.audio-loading[data-idx="${idx}"]`);
          if (el) el.textContent = 'Audio no disponible';
        });
      }
    }
    grid.appendChild(card);
  });

  // captions
  grid.querySelectorAll('.media-caption').forEach(ta => {
    ta.addEventListener('input', e => {
      currentDay.media[parseInt(e.target.dataset.idx)].caption = e.target.value;
      autoResize(e.target); markDirty();
    });
    autoResize(ta);
  });

  // delete
  grid.querySelectorAll('.media-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      currentDay.media.splice(parseInt(e.target.dataset.idx), 1);
      markDirty(); renderMedia();
    });
  });

  // set cover
  grid.querySelectorAll('.media-set-cover').forEach(btn => {
    btn.addEventListener('click', async e => {
      const item = currentDay.media[parseInt(e.target.dataset.idx)];
      if (!item.driveFileId) { alert('Guardá el día primero para poder establecer la portada.'); return; }
      albumMeta = await updateAlbumMeta(albumId, { coverFileId: item.driveFileId });
      renderMedia();
    });
  });

  // drag-to-reorder (desktop)
  initDragReorder(grid);

  // touch reorder (mobile)
  initTouchReorder(grid);
}

// ─── FILE HANDLING ───────────────────────────────────────
const MAX_IMG_PX  = 1200;
const IMG_QUALITY = 0.8;

function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > MAX_IMG_PX || height > MAX_IMG_PX) {
          if (width > height) { height = Math.round(height * MAX_IMG_PX / width); width = MAX_IMG_PX; }
          else { width = Math.round(width * MAX_IMG_PX / height); height = MAX_IMG_PX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', IMG_QUALITY));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function processFiles(files) {
  const allowed = ['image/', 'audio/', 'video/'];
  const valid = Array.from(files).filter(f => allowed.some(t => f.type.startsWith(t)));
  if (!valid.length) return;
  let loaded = 0;
  valid.forEach(file => {
    const isImg   = file.type.startsWith('image/');
    const isVideo = file.type.startsWith('video/');
    if (isImg) {
      compressImage(file).then(data => {
        currentDay.media.push({ type: 'image', name: file.name, data, caption: '' });
        loaded++; if (loaded === valid.length) { markDirty(); renderMedia(); }
      });
    } else if (isVideo) {
      // Videos go directly to Drive on save — store as blob URL in memory for preview
      const blobUrl = URL.createObjectURL(file);
      currentDay.media.push({ type: 'video', name: file.name, data: blobUrl, _file: file, caption: '' });
      loaded++; if (loaded === valid.length) { markDirty(); renderMedia(); }
    } else {
      const reader = new FileReader();
      reader.onload = e => {
        currentDay.media.push({ type: 'audio', name: file.name, data: e.target.result, caption: '' });
        loaded++; if (loaded === valid.length) { markDirty(); renderMedia(); }
      };
      reader.readAsDataURL(file);
    }
  });
}

// ─── FEED MODAL ──────────────────────────────────────────
async function openFeedModal() {
  const list = document.getElementById('day-list');
  list.innerHTML = `<div class="empty-days"><div class="spinner" style="margin:0 auto;"></div></div>`;
  document.getElementById('modal-feed').classList.add('open');
  if (albumMeta) document.getElementById('feed-title').textContent = albumMeta.name;

  let dates = [];
  try {
    dates = await listDayFolders(albumFolderId);
  } catch(e) {
    list.innerHTML = '<div class="empty-days">Error al cargar los días desde Drive</div>';
    return;
  }

  list.innerHTML = '';
  if (!dates.length) {
    list.innerHTML = '<div class="empty-days">Todavía no hay días guardados</div>';
    return;
  }

  dates.slice().reverse().forEach(d => {
    const item = document.createElement('div');
    item.className = 'day-list-item' + (d === currentDate ? ' active' : '');
    item.innerHTML = `
      <div class="day-list-thumb"></div>
      <div class="day-list-info">
        <div class="day-list-date">${formatDate(d)}</div>
        <div class="day-list-title">${formatDateLong(d)}</div>
      </div>`;
    item.addEventListener('click', () => {
      if (dirty && !confirm('Tenés cambios sin guardar. ¿Querés descartarlos?')) return;
      loadDay(d);
      document.getElementById('modal-feed').classList.remove('open');
    });
    list.appendChild(item);
  });
}

// ─── ALBUM VIEW ──────────────────────────────────────────
let albumDays = [], albumIdx = 0, albumPhotoIdx = 0, albumSwipeX = 0;

async function openAlbum() {
  let dates = [];
  try {
    dates = await listDayFolders(albumFolderId);
  } catch(e) {
    alert('Error al cargar el álbum desde Drive'); return;
  }
  if (!dates.length) { alert('Todavía no hay días guardados.'); return; }
  // Load day data for album view from Drive
  const all = [];
  for (const d of dates) {
    const day = await loadDayFromDrive(albumFolderId, d);
    all.push({ date: d, ...(day || emptyDay()) });
  }
  albumDays = all;
  albumIdx = Math.max(0, albumDays.findIndex(d => d.date === currentDate));
  albumPhotoIdx = 0;
  document.getElementById('album-overlay').classList.add('open');
  renderAlbumPage();
}
function closeAlbum() { document.getElementById('album-overlay').classList.remove('open'); }

function renderAlbumPage() {
  const day = albumDays[albumIdx];
  const images = (day.media || []).filter(m => m.type === 'image');
  const photo  = images[albumPhotoIdx] || null;
  document.getElementById('album-date').textContent  = formatDateLong(day.date);
  document.getElementById('album-count').textContent = `${albumIdx + 1} / ${albumDays.length}`;
  document.getElementById('album-btn-edit').onclick  = () => { closeAlbum(); loadDay(day.date); };
  document.getElementById('album-btn-prev').disabled = albumIdx === 0;
  document.getElementById('album-btn-next').disabled = albumIdx === albumDays.length - 1;
  const heroEl = document.getElementById('album-hero');
  if (photo) {
    const src = photo.data || (photo.driveFileId ? `https://drive.google.com/thumbnail?id=${photo.driveFileId}&sz=w1200` : '');
    const caption = photo.caption ? `<div class="album-caption">${photo.caption}</div>` : '';
    const dots = images.length > 1
      ? `<div class="album-dots">${images.map((_, i) => `<div class="album-dot${i === albumPhotoIdx ? ' active' : ''}"></div>`).join('')}</div>` : '';
    heroEl.innerHTML = `<img src="${src}" alt="${photo.name}">
      <div class="album-photo-nav">
        <div class="album-photo-prev" onclick="albumPhotoNav(-1)"></div>
        <div class="album-photo-next" onclick="albumPhotoNav(1)"></div>
      </div>${caption}${dots}`;
  } else {
    heroEl.innerHTML = `<div class="album-hero-empty">旅</div>`;
  }
  document.getElementById('album-label').textContent = formatDate(day.date);
  const titleEl = document.getElementById('album-title');
  titleEl.textContent = day.title || 'Sin título';
  titleEl.className = 'album-title' + (day.title ? '' : ' no-title');
  document.getElementById('album-notes').textContent = day.notes || '';
  const strip = document.getElementById('album-strip');
  if (images.length > 1) {
    strip.style.display = 'flex';
    strip.innerHTML = images.map((img, i) => {
      const src = img.data || (img.driveFileId ? `https://drive.google.com/thumbnail?id=${img.driveFileId}&sz=w200` : '');
      return `<img class="album-strip-thumb${i === albumPhotoIdx ? ' active' : ''}" src="${src}" onclick="albumGoPhoto(${i})">`;
    }).join('');
  } else { strip.style.display = 'none'; }
}

function albumNav(delta) {
  const newIdx = albumIdx + delta;
  if (newIdx < 0 || newIdx >= albumDays.length) return;
  const page = document.getElementById('album-page');
  page.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
  page.style.opacity = '0'; page.style.transform = `translateX(${delta > 0 ? '-24px' : '24px'})`;
  setTimeout(() => {
    albumIdx = newIdx; albumPhotoIdx = 0; renderAlbumPage();
    page.style.transition = 'none'; page.style.opacity = '0';
    page.style.transform = `translateX(${delta > 0 ? '24px' : '-24px'})`;
    requestAnimationFrame(() => {
      page.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
      page.style.opacity = '1'; page.style.transform = 'translateX(0)';
    });
  }, 180);
}
function albumPhotoNav(delta) {
  const images = (albumDays[albumIdx].media || []).filter(m => m.type === 'image');
  const newIdx = albumPhotoIdx + delta;
  if (newIdx < 0 || newIdx >= images.length) return;
  albumPhotoIdx = newIdx; renderAlbumPage();
}
function albumGoPhoto(idx) { albumPhotoIdx = idx; renderAlbumPage(); }
function albumSwipeStart(e) { albumSwipeX = e.touches[0].clientX; }
function albumSwipeEnd(e) {
  const diff = albumSwipeX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 55) albumNav(diff > 0 ? 1 : -1);
}

// ─── RECORDER ────────────────────────────────────────────
let mediaRecorder = null, recorderChunks = [], recorderTimer = null,
    recorderSeconds = 0, recorderStream = null;

function initRecorder() {
  const btnRec  = document.getElementById('btn-record');
  if (!btnRec) return;
  btnRec.addEventListener('click', () => {
    if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
    else startRecording();
  });
}

async function startRecording() {
  try { recorderStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch(e) { document.getElementById('recorder-sub').textContent = 'No se pudo acceder al micrófono'; return; }
  recorderChunks = [];
  mediaRecorder = new MediaRecorder(recorderStream);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recorderChunks.push(e.data); };
  mediaRecorder.onstop = finalizeRecording;
  mediaRecorder.start();
  const row = document.getElementById('recorder-row');
  const btn = document.getElementById('btn-record');
  row.classList.add('recording'); btn.classList.add('recording');
  btn.textContent = '⏹'; document.getElementById('recorder-label').textContent = 'Grabando...';
  document.getElementById('recorder-sub').textContent = 'Tocá para detener';
  document.getElementById('recorder-timer').style.display = 'block';
  recorderSeconds = 0; document.getElementById('recorder-timer').textContent = '0:00';
  recorderTimer = setInterval(() => {
    recorderSeconds++;
    document.getElementById('recorder-timer').textContent = `${Math.floor(recorderSeconds/60)}:${(recorderSeconds%60).toString().padStart(2,'0')}`;
  }, 1000);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (recorderStream) { recorderStream.getTracks().forEach(t => t.stop()); recorderStream = null; }
  clearInterval(recorderTimer);
  const row = document.getElementById('recorder-row');
  const btn = document.getElementById('btn-record');
  row.classList.remove('recording'); btn.classList.remove('recording');
  btn.textContent = '🎙️'; document.getElementById('recorder-label').textContent = 'Grabar audio';
  document.getElementById('recorder-sub').textContent = 'Tocá para empezar a grabar';
  document.getElementById('recorder-timer').style.display = 'none';
}

function finalizeRecording() {
  const mimeType = mediaRecorder.mimeType || 'audio/webm';
  const ext = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'mp4' : 'webm';
  const blob = new Blob(recorderChunks, { type: mimeType });
  const now  = new Date();
  const name = `grabacion-${now.getHours()}h${now.getMinutes().toString().padStart(2,'0')}.${ext}`;
  const reader = new FileReader();
  reader.onload = e => {
    currentDay.media.push({ type: 'audio', name, data: e.target.result, caption: '' });
    markDirty(); renderMedia();
    document.getElementById('recorder-sub').textContent = `✓ "${name}" agregado`;
    setTimeout(() => { const el = document.getElementById('recorder-sub'); if (el) el.textContent = 'Tocá para empezar a grabar'; }, 3000);
  };
  reader.readAsDataURL(blob);
}

// ─── DRAG TO REORDER ─────────────────────────────────────
let dragSrcIdx = null;

function initDragReorder(grid) {
  grid.querySelectorAll('.media-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrcIdx = parseInt(card.dataset.idx);
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      grid.querySelectorAll('.media-card').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      grid.querySelectorAll('.media-card').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      const targetIdx = parseInt(card.dataset.idx);
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
      const moved = currentDay.media.splice(dragSrcIdx, 1)[0];
      currentDay.media.splice(targetIdx, 0, moved);
      dragSrcIdx = null;
      saveCurrentDay();
      renderMedia();
    });
  });
}

function initTouchReorder(grid) {
  let touchSrcIdx = null;
  let touchClone  = null;
  let touchOffX   = 0, touchOffY = 0;

  grid.querySelectorAll('.drag-handle').forEach(handle => {
    handle.addEventListener('touchstart', e => {
      const card = handle.closest('.media-card');
      touchSrcIdx = parseInt(card.dataset.idx);
      const rect = card.getBoundingClientRect();
      touchOffX = e.touches[0].clientX - rect.left;
      touchOffY = e.touches[0].clientY - rect.top;
      // Create floating clone
      touchClone = card.cloneNode(true);
      touchClone.style.cssText = `position:fixed;width:${rect.width}px;opacity:0.85;pointer-events:none;z-index:999;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.15);transition:none;`;
      touchClone.style.left = (e.touches[0].clientX - touchOffX) + 'px';
      touchClone.style.top  = (e.touches[0].clientY - touchOffY) + 'px';
      document.body.appendChild(touchClone);
      card.style.opacity = '0.3';
      e.preventDefault();
    }, { passive: false });

    handle.addEventListener('touchmove', e => {
      if (!touchClone) return;
      touchClone.style.left = (e.touches[0].clientX - touchOffX) + 'px';
      touchClone.style.top  = (e.touches[0].clientY - touchOffY) + 'px';
      // Highlight card under finger
      touchClone.style.display = 'none';
      const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
      touchClone.style.display = '';
      const targetCard = el && el.closest('.media-card');
      grid.querySelectorAll('.media-card').forEach(c => c.classList.remove('drag-over'));
      if (targetCard && targetCard !== grid.querySelector(`[data-idx="${touchSrcIdx}"]`)) {
        targetCard.classList.add('drag-over');
      }
      e.preventDefault();
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (touchClone) { touchClone.remove(); touchClone = null; }
      grid.querySelectorAll('.media-card').forEach(c => {
        c.style.opacity = '';
        c.classList.remove('drag-over');
      });
      // Find drop target
      const el = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      const targetCard = el && el.closest('.media-card');
      if (targetCard) {
        const targetIdx = parseInt(targetCard.dataset.idx);
        if (touchSrcIdx !== null && touchSrcIdx !== targetIdx) {
          const moved = currentDay.media.splice(touchSrcIdx, 1)[0];
          currentDay.media.splice(targetIdx, 0, moved);
          saveCurrentDay();
          renderMedia();
        }
      }
      touchSrcIdx = null;
    });
  });
}

// ─── HELPERS ─────────────────────────────────────────────
function emptyDay() { return { title: '', notes: '', media: [] }; }
function todayStr()  { return new Date().toISOString().slice(0, 10); }
function isToday(s)  { return s === todayStr(); }

function formatDate(str) {
  const [y, m, d] = str.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}
function formatDateLong(str) {
  return new Date(str + 'T12:00:00').toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function updateDateHeader() {
  const disp = document.getElementById('date-display');
  const lbl  = document.getElementById('day-label');
  if (disp) disp.textContent = formatDate(currentDate);
  if (lbl)  lbl.textContent  = isToday(currentDate) ? 'Hoy · ' + formatDateLong(currentDate) : formatDateLong(currentDate);
}

function markDirty() { dirty = true; setStatus('unsaved', 'Cambios sin guardar'); }
function setStatus(cls, msg) {
  const el = document.getElementById('save-status');
  el.className = 'save-status' + (cls ? ' ' + cls : '');
  el.textContent = msg;
}
function autoResize(el) { if (!el) return; el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
function navigate(delta) {
  if (dirty && !confirm('Tenés cambios sin guardar. ¿Querés descartarlos?')) return;
  const date = new Date(currentDate + 'T12:00:00');
  date.setDate(date.getDate() + delta);
  loadDay(date.toISOString().slice(0, 10));
}

// ─── BIND PAGE EVENTS ────────────────────────────────────
function bindPageEvents() {
  document.getElementById('day-title').addEventListener('input', e => {
    currentDay.title = e.target.value; autoResize(e.target); markDirty();
  });
  document.getElementById('day-notes').addEventListener('input', e => {
    currentDay.notes = e.target.value; autoResize(e.target); markDirty();
  });
  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); processFiles(e.dataTransfer.files); });
  fileInput.addEventListener('change', e => processFiles(e.target.files));
}

// ─── HEADER EVENTS ───────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', saveCurrentDay);
document.getElementById('btn-discard').addEventListener('click', () => { loadDay(currentDate); setStatus('', 'Cambios descartados'); });
document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
document.getElementById('btn-next').addEventListener('click', () => navigate(1));
document.getElementById('btn-album').addEventListener('click', openAlbum);
document.getElementById('btn-feed').addEventListener('click', openFeedModal);
document.getElementById('feed-close').addEventListener('click', () => document.getElementById('modal-feed').classList.remove('open'));
document.getElementById('modal-feed').addEventListener('click', e => { if (e.target === e.currentTarget) e.target.classList.remove('open'); });

document.getElementById('date-display').addEventListener('click', () => {
  const input = document.getElementById('date-input');
  input.value = currentDate; input.style.pointerEvents = 'all'; input.click(); input.style.pointerEvents = 'none';
});
document.getElementById('date-input').addEventListener('change', e => {
  if (dirty && !confirm('Tenés cambios sin guardar. ¿Querés descartarlos?')) return;
  loadDay(e.target.value);
});

document.addEventListener('keydown', e => {
  if (document.getElementById('album-overlay').classList.contains('open')) {
    if (e.key === 'ArrowLeft') albumNav(-1);
    if (e.key === 'ArrowRight') albumNav(1);
    if (e.key === 'Escape') closeAlbum();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveCurrentDay(); }
});
